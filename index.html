  <meta charset="UTF-8" />
  <title>HyperPieces</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 40px 20px 80px;
      background: #8BF5C5;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Pacifico', cursive;
      text-align: center;
      color: #000;
      overflow-x: hidden;
    }

    .fade-in { opacity: 0; animation: fadeIn 1s ease-in forwards; }
    .fade-in:nth-child(1) { animation-delay: 0.2s; }
    .fade-in:nth-child(2) { animation-delay: 0.4s; }
    .fade-in:nth-child(3) { animation-delay: 0.6s; }
    .fade-in:nth-child(4) { animation-delay: 0.8s; }
    .fade-in:nth-child(5) { animation-delay: 1.0s; }
    .fade-in:nth-child(6) { animation-delay: 1.2s; }
    @keyframes fadeIn { to { opacity: 1; } }

    img.hero { width: 350px; max-width: 80%; margin-bottom: 10px; }
    h1 { font-size: 60px; margin: 10px 0 30px; }

    .cta { margin-bottom: 30px; }
    .play-button {
      display: inline-block; background: #000; color: #8BF5C5;
      font-size: 22px; font-weight: bold; padding: 16px 32px;
      border-radius: 10px; text-decoration: none;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    .play-button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(0,0,0,0.4); }

    .links a {
      display: block; margin: 8px 0; padding: 12px 24px;
      text-decoration: none; background: #000; color: #8BF5C5;
      border-radius: 8px; font-size: 18px;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      width: 80%; max-width: 300px;
    }
    .links a:hover { background: #333; color: #fff; box-shadow: 0 0 15px rgba(0,0,0,0.4); }

    /* ── Trait Library ── */
    .trait-library { width: 100%; max-width: 900px; margin-top: 60px; }
    .trait-library h2 { font-size: 42px; margin: 0 0 8px; }
    .trait-library .subtitle {
      font-size: 14px; opacity: 0.6; margin: 0 0 32px;
      font-family: Arial, sans-serif; letter-spacing: 0.5px;
    }

    .category-block { margin-bottom: 14px; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

    .category-toggle {
      width: 100%; background: #000; color: #8BF5C5; border: none;
      padding: 18px 24px; font-family: 'Pacifico', cursive; font-size: 20px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; gap: 12px; transition: background 0.2s;
    }
    .category-toggle:hover { background: #1a1a1a; }
    .category-toggle .cat-left { display: flex; align-items: center; gap: 12px; }
    .category-toggle .cat-icon { font-size: 22px; }
    .category-toggle .cat-count {
      font-family: Arial, sans-serif; font-size: 13px;
      background: rgba(139,245,197,0.2); border: 1px solid rgba(139,245,197,0.4);
      border-radius: 20px; padding: 2px 10px; white-space: nowrap;
    }
    .category-toggle .arrow { font-size: 14px; transition: transform 0.3s; flex-shrink: 0; }
    .category-toggle.open .arrow { transform: rotate(180deg); }

    .trait-panel { display: none; background: rgba(0,0,0,0.04); padding: 20px; }
    .trait-panel.open { display: block; }

    .trait-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }

    .trait-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .trait-img {
      width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      background: var(--cat-color, #ccc); display: flex; align-items: center;
      justify-content: center; position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .trait-card:hover .trait-img { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.25); }

    .trait-img img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    /* Fallback initials shown while image loads or if it fails */
    .trait-img .initials {
      font-family: 'Pacifico', cursive; font-size: 24px;
      color: rgba(255,255,255,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      z-index: 1;
    }
    .trait-img img.loaded + .initials { display: none; }

    .trait-name {
      font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
      text-align: center; color: #000; line-height: 1.3;
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* 1/1 gold glow */
    .trait-card.one-of-one .trait-img {
      box-shadow: 0 0 0 2px #FFD700, 0 2px 12px rgba(255,215,0,0.4);
    }
    .trait-card.one-of-one:hover .trait-img {
      box-shadow: 0 0 0 2px #FFD700, 0 6px 22px rgba(255,215,0,0.6);
    }

    @media (max-width: 480px) {
      .trait-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .trait-img .initials { font-size: 18px; }
      h1 { font-size: 42px; }
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }
    function lighten(hex, amt = 40) {
      const n = parseInt(hex.replace('#',''), 16);
      const r = Math.min(255, (n >> 16) + amt);
      const g = Math.min(255, ((n >> 8) & 0xff) + amt);
      const b = Math.min(255, (n & 0xff) + amt);
      return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
    }

      const grid = document.createElement('div');
      grid.className = 'trait-grid';

      cat.traits.forEach(trait => {

        card.className = 'trait-card' + (cat.oneOfOne ? ' one-of-one' : '');

        const imgBox = document.createElement('div');
        imgBox.className = 'trait-img';
        imgBox.style.background = `linear-gradient(135deg, ${cat.color}, ${lighten(cat.color, 40)})`;

        // Always show initials as fallback behind the image
        const init = document.createElement('span');
        init.className = 'initials';
        init.textContent = initials(trait.name);

        if (trait.img) {
          const img = document.createElement('img');
          img.alt = trait.name;
          img.loading = 'lazy';
          img.src = trait.img;
          img.addEventListener('load', () => img.classList.add('loaded'));
          imgBox.appendChild(img);
        }
        imgBox.appendChild(init);

        const label = document.createElement('div');
        label.className = 'trait-name';
        label.textContent = trait.name;

        card.appendChild(imgBox);
        card.appendChild(label);
        grid.appendChild(card);
      });

      panel.appendChild(grid);
      block.appendChild(toggle);
      block.appendChild(panel);
      container.appendChild(block);

      toggle.addEventListener('click', () => {
        const open = panel.classList.contains('open');
        toggle.classList.toggle('open', !open);
        panel.classList.toggle('open', !open);
      });
