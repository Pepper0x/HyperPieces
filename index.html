<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HyperPieces</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      background: #8BF5C5;
      display: flex; flex-direction: column; align-items: center;
      font-family: 'Pacifico', cursive;
      text-align: center; color: #000;
      overflow-x: hidden;
    }

    /* ── Animations ── */
    .fade-in { opacity: 0; animation: fadeIn 0.8s ease-out forwards; }
    .fade-in:nth-child(1) { animation-delay: 0.1s; }
    .fade-in:nth-child(2) { animation-delay: 0.25s; }
    .fade-in:nth-child(3) { animation-delay: 0.4s; }
    .fade-in:nth-child(4) { animation-delay: 0.55s; }
    .fade-in:nth-child(5) { animation-delay: 0.7s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* ── HERO ── */
    .hero {
      width: 100%; padding: 60px 24px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .hero-img { width: 300px; max-width: 75%; }
    .hero h1 { font-size: clamp(48px, 12vw, 72px); margin: 16px 0 40px; line-height: 1; }
    .hero .tagline {
      font-family: Arial, sans-serif; font-size: 14px;
      letter-spacing: 2px; text-transform: uppercase;
      opacity: 0.5; margin: 0 0 36px;
    }

    /* ── Play button ── */
    .btn-play {
      display: inline-flex; align-items: center; gap: 10px;
      background: #000; color: #8BF5C5;
      font-family: 'Pacifico', cursive; font-size: 22px;
      padding: 18px 40px; border-radius: 14px;
      text-decoration: none; width: 100%; max-width: 340px;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn-play:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }

    /* ── Action groups ── */
    .action-section {
      width: 100%; max-width: 340px;
      margin-top: 20px; padding: 0 24px;
    }
    .action-label {
      font-family: Arial, sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
      opacity: 0.4; margin-bottom: 10px;
    }
    .btn-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .btn-secondary {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: #000; color: #8BF5C5;
      font-family: 'Pacifico', cursive; font-size: 14px;
      padding: 13px 10px; border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-secondary:hover { background: #222; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.25); }
    .btn-secondary .btn-icon { font-size: 16px; }

    /* ── Divider before traits ── */
    .section-divider {
      width: 100%; margin: 56px 0 0;
      display: flex; flex-direction: column; align-items: center; gap: 0;
    }
    .section-divider svg { width: 100%; height: 48px; display: block; }

    /* ── Trait Library ── */
    .trait-library {
      width: 100%; background: rgba(0,0,0,0.06);
      padding: 48px 20px 80px;
      display: flex; flex-direction: column; align-items: center;
    }
    .trait-library-inner { width: 100%; max-width: 860px; }
    .trait-library h2 { font-size: clamp(32px, 8vw, 48px); margin: 0 0 6px; }
    .trait-library .subtitle {
      font-size: 13px; opacity: 0.5; margin: 0 0 36px;
      font-family: Arial, sans-serif; letter-spacing: 0.5px;
    }

    .category-block { margin-bottom: 14px; border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.12); }

    .category-toggle {
      width: 100%; background: #000; color: #8BF5C5; border: none;
      padding: 18px 24px; font-family: 'Pacifico', cursive; font-size: 20px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; gap: 12px; transition: background 0.2s;
    }
    .category-toggle:hover { background: #1a1a1a; }
    .category-toggle .arrow { font-size: 14px; transition: transform 0.3s; flex-shrink: 0; }
    .category-toggle.open .arrow { transform: rotate(180deg); }

    .trait-panel {
      overflow: hidden;
      height: 0;
      background: rgba(0,0,0,0.04);
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .trait-panel-inner { padding: 20px; }

    .trait-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }

    .trait-card { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .trait-img {
      width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden;
      background: var(--cat-color, #ccc); display: flex; align-items: center;
      justify-content: center; position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .trait-card:hover .trait-img { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.25); }

    .trait-img img {
      width: 100%; height: 100%; object-fit: cover;
      position: absolute; inset: 0;
    }
    /* Fallback initials shown while image loads or if it fails */
    .trait-img .initials {
      font-family: 'Pacifico', cursive; font-size: 24px;
      color: rgba(255,255,255,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      z-index: 1;
    }
    .trait-img img.loaded + .initials { display: none; }

    .trait-name {
      font-family: Arial, sans-serif; font-size: 11px; font-weight: 700;
      text-align: center; color: #000; line-height: 1.3;
      text-transform: uppercase; letter-spacing: 0.3px;
    }

    /* 1/1 gold glow */
    .trait-card.one-of-one .trait-img {
      box-shadow: 0 0 0 2px #FFD700, 0 2px 12px rgba(255,215,0,0.4);
    }
    .trait-card.one-of-one:hover .trait-img {
      box-shadow: 0 0 0 2px #FFD700, 0 6px 22px rgba(255,215,0,0.6);
    }

    @media (max-width: 480px) {
      .trait-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .trait-img .initials { font-size: 18px; }
      h1 { font-size: 42px; }
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.85);
      align-items: center; justify-content: center;
      cursor: zoom-out;
      padding: 24px;
    }
    .lightbox.active { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: min(480px, 90vw);
      width: 100%;
      animation: lbPop 0.18s ease-out;
    }
    @keyframes lbPop {
      from { transform: scale(0.88); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .lightbox-img {
      width: 100%; border-radius: 16px;
      box-shadow: 0 12px 50px rgba(0,0,0,0.6);
      display: block;
    }

    .lightbox-name {
      margin-top: 14px;
      font-family: 'Pacifico', cursive;
      font-size: 20px; color: #fff;
      text-align: center;
      text-shadow: 0 1px 6px rgba(0,0,0,0.5);
    }

    .lightbox-close {
      position: absolute; top: -14px; right: -14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: #fff; border: none; cursor: pointer;
      font-size: 16px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .trait-img { cursor: zoom-in; }

    /* ── Lightbox nav arrows ── */
    .lb-arrow {
      position: fixed;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      color: #fff; font-size: 32px;
      width: 52px; height: 52px; border-radius: 50%;
      cursor: pointer; z-index: 1002;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s, opacity 0.18s;
      line-height: 1; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .lb-arrow:hover { background: rgba(255,255,255,0.3); }
    .lb-arrow.hidden { opacity: 0; pointer-events: none; }
    #lb-prev { left: 16px; }
    #lb-next { right: 16px; }

    /* counter */
    .lb-counter {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-family: Arial, sans-serif; font-size: 13px;
      color: rgba(255,255,255,0.5); z-index: 1002;
      letter-spacing: 1px;
    }
  </style>
</head>

          { name: "Cloud",     img: ipfs('QmX4VknsW5uNPztj9bUp3R69qWRRXATtCiqp95Es3Hiudn') },
          { name: "Car",       img: ipfs('QmRiH4fmNa7RnsJcGY2xBcR1QVBNisXDWjDHBKCoPUxtbE') },
          { name: "Meteorite", img: ipfs('Qmao8y9RGe42tDmGdRUDLBymrAsUKzr9kaHU4pw9FfhQAn') },
          { name: "Mushroom",  img: ipfs('QmUGqjh3DJbSW92Xu6uE4Nh2jmwdCpTgSQ9ai1NcPM7uVG') },
          { name: "Snake",     img: ipfs('QmTvw6KNDvwbdHfau4Ju6HPDYyirwct6K2naEfv5Zbfaz8') },
          { name: "Money",     img: ipfs('QmV5Vs8M8VxWtHY8Uzkzi5WFVxLrWTzbvw5hRTM9n5N8jp') },
          { name: "Sun",       img: ipfs('QmXeGQu6hp9j2My7xKEhhahUJjnb63PR1pRbg9QHxoSmMK') },
          { name: "House",     img: ipfs('QmQjh9iua29DrnDy3kz66jdvW85zxSSMvDVWwo6mGowwU3') },
          { name: "Moon",      img: ipfs('QmNxfPy6jHAg9YyUTiS7eFf8wbKZpKxr9FDe57uBezR62v') },
          { name: "Cactus",    img: ipfs('QmVxt6fbs6aHpMhCgGfnsExUaC91yp3VzaJRy8NVk9fz5R') },
          { name: "Tree",      img: ipfs('QmNfXQtS97VV6uCrBprbpayXZv9w2338JXLQ2cLz1CyF5a') },
          { name: "Planet",    img: ipfs('QmeCcQdcxJ2vN7XEcEZVUbr16f3XjAkVQcaDuRF2eLiT3U') },
          { name: "Big UFO",   img: ipfs('QmeCJMCkKYGaAKwNQs4cwwhtvgVN8X4DSJdjuNzdP6raE2') },
          { name: "Rain",      img: ipfs('QmW4aUdMxujDtdoWES4oQUWrEvR5g1V6gQxw59NHaDHJf3') },
        ]
      }
    ];

    // ── Lightbox setup ───────────────────────────────────────────────────────
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lightbox-img');
    const lbName    = document.getElementById('lightbox-name');
    const lbClose   = document.getElementById('lightbox-close');
    const lbInner   = document.getElementById('lightbox-inner');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');
    const lbCounter = document.getElementById('lb-counter');

    let lbItems = [];   // current category's traits (with images)
    let lbIndex = 0;    // current position

    function showLbItem(index) {
      const item = lbItems[index];
      lbImg.src = item.img.replace('w=300', 'w=800');
      lbName.textContent = item.name;
      lbIndex = index;
      // Arrows: hide at ends
      lbPrev.classList.toggle('hidden', index === 0);
      lbNext.classList.toggle('hidden', index === lbItems.length - 1);
      // Counter
      lbCounter.textContent = `${index + 1} / ${lbItems.length}`;
    }

    function openLightbox(items, startIndex) {
      lbItems = items;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
      showLbItem(startIndex);
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    lightbox.addEventListener('click', closeLightbox);
    lbClose.addEventListener('click', closeLightbox);
    lbInner.addEventListener('click', e => e.stopPropagation());
    lbPrev.addEventListener('click', e => { e.stopPropagation(); if (lbIndex > 0) showLbItem(lbIndex - 1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); if (lbIndex < lbItems.length - 1) showLbItem(lbIndex + 1); });
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft'  && lbIndex > 0)                    showLbItem(lbIndex - 1);
      if (e.key === 'ArrowRight' && lbIndex < lbItems.length - 1)   showLbItem(lbIndex + 1);
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function initials(name) {
      return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }
    function lighten(hex, amt = 40) {
      const n = parseInt(hex.replace('#',''), 16);
      const r = Math.min(255, (n >> 16) + amt);
      const g = Math.min(255, ((n >> 8) & 0xff) + amt);
      const b = Math.min(255, (n & 0xff) + amt);
      return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
    }

    // ── Render ────────────────────────────────────────────────────────────────
    const container = document.getElementById('categories-container');

    CATEGORIES.forEach(cat => {
      const block = document.createElement('div');
      block.className = 'category-block';

      const toggle = document.createElement('button');
      toggle.className = 'category-toggle';
      toggle.innerHTML = `
        <span>${cat.name}</span>
        <span class="arrow">▼</span>`;

      const panel = document.createElement('div');
      panel.className = 'trait-panel';

      const grid = document.createElement('div');
      grid.className = 'trait-grid';

      cat.traits.forEach(trait => {
        const card = document.createElement('div');
        card.className = 'trait-card' + (cat.oneOfOne ? ' one-of-one' : '');

        const imgBox = document.createElement('div');
        imgBox.className = 'trait-img';
        imgBox.style.background = `linear-gradient(135deg, ${cat.color}, ${lighten(cat.color, 40)})`;

        // Always show initials as fallback behind the image
        const init = document.createElement('span');
        init.className = 'initials';
        init.textContent = initials(trait.name);

        if (trait.img) {
          const img = document.createElement('img');
          img.alt = trait.name;
          img.loading = 'lazy';
          img.src = trait.img;
          img.addEventListener('load', () => img.classList.add('loaded'));
          imgBox.appendChild(img);
        }
        imgBox.appendChild(init);

        const label = document.createElement('div');
        label.className = 'trait-name';
        label.textContent = trait.name;

        // Open lightbox on click — pass the whole category for arrow nav
        imgBox.addEventListener('click', () => {
          if (!trait.img) return;
          const catItems  = cat.traits.filter(t => t.img);
          const startIdx  = catItems.findIndex(t => t.name === trait.name);
          openLightbox(catItems, startIdx >= 0 ? startIdx : 0);
        });

        card.appendChild(imgBox);
        card.appendChild(label);
        grid.appendChild(card);
      });

      const inner = document.createElement('div');
      inner.className = 'trait-panel-inner';
      inner.appendChild(grid);
      panel.appendChild(inner);
      block.appendChild(toggle);
      block.appendChild(panel);
      container.appendChild(block);

      function closePanel(t, p) {
        p.style.height = p.scrollHeight + 'px';
        requestAnimationFrame(() => { p.style.height = '0'; });
        t.classList.remove('open');
      }

      function openPanel(t, p) {
        p.style.height = p.scrollHeight + 'px';
        p.addEventListener('transitionend', () => {
          if (t.classList.contains('open')) p.style.height = 'auto';
        }, { once: true });
        t.classList.add('open');
      }

      toggle.addEventListener('click', () => {
        const isOpen = toggle.classList.contains('open');
        // Close all others
        document.querySelectorAll('.category-toggle.open').forEach(t => {
          const p = t.closest('.category-block').querySelector('.trait-panel');
          closePanel(t, p);
        });
        // Toggle this one
        if (!isOpen) openPanel(toggle, panel);
      });
    });
  </script>
